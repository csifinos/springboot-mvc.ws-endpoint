spring.application.name=ws-endpoint

spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.ws.allowedOrigins=http://localhost:8080
app.ws.brokerURL=ws://localhost:8080/ws-endpoint?sessionId=
app.ws.heartbeatIncoming=PT10S
app.ws.heartbeatOutgoing=PT10S
app.ws.reconnectDelay=PT5S
app.ws.sessionTtl=PT2M
app.ws.presenceTtl=PT2M
app.ws.refreshInterval=PT90S
